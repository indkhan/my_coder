<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>my_operator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <h1>my_operator</h1>
      <button id="settings-btn" class="icon-btn" title="Settings">&#9881;</button>
    </header>

    <!-- Main layout: chat + plan + logs -->
    <div class="main">
      <!-- Chat panel -->
      <div class="panel chat-panel">
        <h2>Chat</h2>
        <div id="chat-log" class="scroll-area"></div>
        <div class="input-row">
          <input id="command-input" type="text" placeholder="Enter a command..." autocomplete="off" />
          <button id="send-btn" class="btn primary">Send</button>
        </div>
      </div>

      <!-- Plan panel -->
      <div class="panel plan-panel-container">
        <h2>Plan</h2>
        <div id="plan-panel" class="scroll-area">
          <p class="muted">No plan yet. Submit a command to generate one.</p>
        </div>
      </div>

      <!-- Logs panel -->
      <div class="panel logs-panel-container">
        <h2>Logs</h2>
        <div id="logs-panel" class="scroll-area"></div>
      </div>
    </div>

    <!-- Settings modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Settings</h2>
          <button id="settings-close" class="icon-btn">&times;</button>
        </div>
        <div class="modal-body">
          <label>Provider
            <select id="setting-provider">
              <option value="openrouter">OpenRouter</option>
              <option value="openai">OpenAI</option>
              <option value="anthropic">Claude / Anthropic</option>
              <option value="gemini">Gemini</option>
              <option value="groq">Groq</option>
              <option value="ollama">Ollama (local)</option>
            </select>
          </label>
          <label>Model
            <input id="setting-model" type="text" placeholder="e.g. anthropic/claude-haiku-4.5" />
          </label>
          <label>API Key
            <input id="setting-api-key" type="password" placeholder="API key" />
          </label>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
